  <circle cx="980" cy="392" r="1.6" fill="#5cb83a" opacity="0.24"/>
  <circle cx="1060" cy="392" r="1.7" fill="#3a7a1a" opacity="0.28"/>
  <circle cx="1140" cy="392" r="1.8" fill="#4a8a2a" opacity="0.25"/>
  <circle cx="1220" cy="392" r="1.7" fill="#3a7a1a" opacity="0.28"/>
  <circle cx="1300" cy="392" r="1.6" fill="#5cb83a" opacity="0.24"/>
  <circle cx="1380" cy="392" r="1.7" fill="#3a7a1a" opacity="0.28"/>

  <!-- Row at y=375 (even smaller) -->
  <circle cx="140" cy="375" r="1.4" fill="#3a7a1a" opacity="0.22"/>
  <circle cx="240" cy="375" r="1.5" fill="#4a8a2a" opacity="0.2"/>
  <circle cx="340" cy="375" r="1.4" fill="#3a7a1a" opacity="0.22"/>
  <circle cx="440" cy="375" r="1.3" fill="#5cb83a" opacity="0.18"/>
  <circle cx="540" cy="375" r="1.4" fill="#3a7a1a" opacity="0.22"/>
  <circle cx="640" cy="375" r="1.5" fill="#4a8a2a" opacity="0.2"/>
  <circle cx="740" cy="375" r="1.4" fill="#3a7a1a" opacity="0.22"/>
  <circle cx="840" cy="375" r="1.3" fill="#5cb83a" opacity="0.18"/>
