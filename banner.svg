  <!-- Row at y=432 -->
  <circle cx="90"  cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="150" cy="432" r="2.6" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="210" cy="432" r="2.3" fill="#3a7a1a" opacity="0.4"/>
  <circle cx="270" cy="432" r="2.5" fill="#5cb83a" opacity="0.35"/>
  <circle cx="330" cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="390" cy="432" r="2.2" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="450" cy="432" r="2.5" fill="#3a7a1a" opacity="0.4"/>
  <circle cx="510" cy="432" r="2.3" fill="#5cb83a" opacity="0.35"/>
  <circle cx="570" cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="630" cy="432" r="2.6" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="690" cy="432" r="2.3" fill="#3a7a1a" opacity="0.4"/>
  <circle cx="750" cy="432" r="2.5" fill="#5cb83a" opacity="0.36"/>
  <circle cx="810" cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="870" cy="432" r="2.2" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="930" cy="432" r="2.5" fill="#3a7a1a" opacity="0.4"/>
  <circle cx="990" cy="432" r="2.3" fill="#5cb83a" opacity="0.35"/>
  <circle cx="1050" cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="1110" cy="432" r="2.6" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="1170" cy="432" r="2.3" fill="#3a7a1a" opacity="0.4"/>
  <circle cx="1230" cy="432" r="2.5" fill="#5cb83a" opacity="0.36"/>
  <circle cx="1290" cy="432" r="2.4" fill="#3a7a1a" opacity="0.42"/>
  <circle cx="1350" cy="432" r="2.2" fill="#4a8a2a" opacity="0.38"/>
  <circle cx="1410" cy="432" r="2.5" fill="#3a7a1a" opacity="0.4"/>

  <!-- Row at y=411 -->
  <circle cx="60"  cy="411" r="2"   fill="#3a7a1a" opacity="0.35"/>
  <circle cx="130" cy="411" r="2.2" fill="#4a8a2a" opacity="0.32"/>
