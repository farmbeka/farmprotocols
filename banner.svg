  <circle cx="660" cy="455" r="2.5" fill="#3a7a1a" opacity="0.48"/>
  <circle cx="720" cy="455" r="3"   fill="#5cb83a" opacity="0.42"/>
  <circle cx="780" cy="455" r="2.6" fill="#3a7a1a" opacity="0.5"/>
  <circle cx="840" cy="455" r="2.8" fill="#4a8a2a" opacity="0.45"/>
  <circle cx="900" cy="455" r="2.5" fill="#3a7a1a" opacity="0.48"/>
  <circle cx="960" cy="455" r="2.7" fill="#5cb83a" opacity="0.4"/>
  <circle cx="1020" cy="455" r="2.9" fill="#3a7a1a" opacity="0.5"/>
  <circle cx="1080" cy="455" r="2.5" fill="#4a8a2a" opacity="0.44"/>
  <circle cx="1140" cy="455" r="2.8" fill="#3a7a1a" opacity="0.48"/>
  <circle cx="1200" cy="455" r="2.6" fill="#5cb83a" opacity="0.42"/>
  <circle cx="1260" cy="455" r="2.7" fill="#3a7a1a" opacity="0.5"/>
  <circle cx="1320" cy="455" r="2.4" fill="#4a8a2a" opacity="0.45"/>
