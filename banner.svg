  <circle cx="1180" cy="411" r="2"  fill="#3a7a1a" opacity="0.35"/>
  <circle cx="1250" cy="411" r="2.2" fill="#4a8a2a" opacity="0.32"/>
  <circle cx="1320" cy="411" r="2"  fill="#3a7a1a" opacity="0.34"/>
  <circle cx="1390" cy="411" r="2.1" fill="#5cb83a" opacity="0.3"/>

  <!-- Row at y=392 (smaller, fading) -->
