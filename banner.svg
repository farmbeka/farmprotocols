<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <!-- Background gradient: dark, slight green tint at bottom -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1a2a14"/>
    </linearGradient>

    <!-- Leaf gradient matching logo -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7a1a"/>
      <stop offset="100%" stop-color="#5cb83a"/>
    </linearGradient>

    <!-- Soil brown for ground lines -->
    <!-- Blue glow for data elements -->
    <filter id="dataGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="leafShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a3a0a" flood-opacity="0.5"/>
    </filter>

    <!-- Subtle noise texture overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <!-- Very subtle grain -->
  <rect width="1500" height="500" fill="url(#bgGrad)" filter="url(#grain)" opacity="0.04"/>

  <!-- ===== FIELD GRID — perspective rows of soil, like looking down at a farm ===== -->
  <!-- These are horizontal "row" lines that get slightly closer together toward the top (subtle perspective) -->
  <!-- Bottom rows (closer, more spaced) -->
  <line x1="0"   y1="480" x2="1500" y2="480" stroke="#6B4423" stroke-width="1.2" opacity="0.22"/>
  <line x1="0"   y1="455" x2="1500" y2="455" stroke="#6B4423" stroke-width="1.1" opacity="0.2"/>
  <line x1="0"   y1="432" x2="1500" y2="432" stroke="#6B4423" stroke-width="1"   opacity="0.18"/>
  <line x1="0"   y1="411" x2="1500" y2="411" stroke="#6B4423" stroke-width="0.9" opacity="0.17"/>
  <line x1="0"   y1="392" x2="1500" y2="392" stroke="#6B4423" stroke-width="0.9" opacity="0.15"/>
  <line x1="0"   y1="375" x2="1500" y2="375" stroke="#6B4423" stroke-width="0.8" opacity="0.14"/>
  <line x1="0"   y1="360" x2="1500" y2="360" stroke="#6B4423" stroke-width="0.8" opacity="0.13"/>
  <line x1="0"   y1="346" x2="1500" y2="346" stroke="#6B4423" stroke-width="0.7" opacity="0.12"/>
  <line x1="0"   y1="334" x2="1500" y2="334" stroke="#6B4423" stroke-width="0.7" opacity="0.11"/>
  <line x1="0"   y1="323" x2="1500" y2="323" stroke="#6B4423" stroke-width="0.6" opacity="0.1"/>
  <line x1="0"   y1="313" x2="1500" y2="313" stroke="#6B4423" stroke-width="0.6" opacity="0.09"/>
  <line x1="0"   y1="304" x2="1500" y2="304" stroke="#6B4423" stroke-width="0.5" opacity="0.08"/>
  <line x1="0"   y1="296" x2="1500" y2="296" stroke="#6B4423" stroke-width="0.5" opacity="0.07"/>
  <line x1="0"   y1="289" x2="1500" y2="289" stroke="#6B4423" stroke-width="0.5" opacity="0.06"/>
  <line x1="0"   y1="283" x2="1500" y2="283" stroke="#6B4423" stroke-width="0.4" opacity="0.05"/>

  <!-- ===== CROP PLANTS — small green dots arranged in grid rows along the soil lines ===== -->
  <!-- Row at y=455 -->
  <circle cx="60"  cy="455" r="2.8" fill="#3a7a1a" opacity="0.5"/>
  <circle cx="120" cy="455" r="2.5" fill="#4a8a2a" opacity="0.45"/>
  <circle cx="180" cy="455" r="3"   fill="#3a7a1a" opacity="0.5"/>
