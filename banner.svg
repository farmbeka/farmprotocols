  <circle cx="1340" cy="375" r="1.4" fill="#3a7a1a" opacity="0.22"/>

  <!-- ===== DATA SENSOR NETWORK — blue circuit traces & nodes across the field ===== -->
  <g filter="url(#dataGlow)">

    <!-- === SENSOR CLUSTER 1 — left third === -->
    <!-- Main horizontal trace -->
    <line x1="80"  y1="380" x2="280" y2="380" stroke="#0066CC" stroke-width="1.8" opacity="0.6"/>
    <circle cx="80"  cy="380" r="3.5" fill="#0066CC" opacity="0.7"/>
    <circle cx="180" cy="380" r="2.5" fill="#0066CC" opacity="0.5"/>
    <circle cx="280" cy="380" r="4"   fill="#0066CC" opacity="0.8"/>
    <!-- Vertical drop from node -->
    <line x1="280" y1="380" x2="280" y2="430" stroke="#0066CC" stroke-width="1.4" opacity="0.5"/>
    <circle cx="280" cy="430" r="2.8" fill="#0066CC" opacity="0.55"/>
    <!-- Branch right -->
    <line x1="280" y1="430" x2="340" y2="430" stroke="#0066CC" stroke-width="1.2" opacity="0.4"/>
    <circle cx="340" cy="430" r="2.2" fill="#0066CC" opacity="0.45"/>
    <!-- Vertical up from main -->
    <line x1="180" y1="380" x2="180" y2="340" stroke="#0066CC" stroke-width="1.3" opacity="0.45"/>
    <circle cx="180" cy="340" r="2.5" fill="#0066CC" opacity="0.5"/>

    <!-- === SENSOR CLUSTER 2 — center, with ascending trend === -->
    <!-- Horizontal base -->
    <line x1="580" y1="350" x2="780" y2="350" stroke="#0066CC" stroke-width="2" opacity="0.65"/>
    <circle cx="580" cy="350" r="3.8" fill="#0066CC" opacity="0.75"/>
    <circle cx="680" cy="350" r="2.8" fill="#0066CC" opacity="0.55"/>
    <circle cx="780" cy="350" r="4.2" fill="#0066CC" opacity="0.85"/>
    <!-- Ascending trend line upward from right node -->
    <line x1="780" y1="350" x2="810" y2="318" stroke="#0066CC" stroke-width="2" opacity="0.75"/>
    <circle cx="810" cy="318" r="3.5" fill="#0066CC" opacity="0.7"/>
    <line x1="810" y1="318" x2="845" y2="282" stroke="#0066CC" stroke-width="2.2" opacity="0.8"/>
    <circle cx="845" cy="282" r="4"   fill="#0066CC" opacity="0.8"/>
    <line x1="845" y1="282" x2="882" y2="248" stroke="#0066CC" stroke-width="2.2" opacity="0.82"/>
    <circle cx="882" cy="248" r="4.5" fill="#0066CC" opacity="0.88"/>
    <line x1="882" y1="248" x2="920" y2="215" stroke="#0066CC" stroke-width="2.4" opacity="0.85"/>
    <!-- Peak node with pulse ring -->
