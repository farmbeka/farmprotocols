    <circle cx="920" cy="215" r="9.5" fill="none" stroke="#0066CC" stroke-width="1.5" opacity="0.3"/>
    <!-- Drop from left node -->
    <line x1="680" y1="350" x2="680" y2="405" stroke="#0066CC" stroke-width="1.3" opacity="0.42"/>
    <circle cx="680" cy="405" r="2.2" fill="#0066CC" opacity="0.45"/>

    <!-- === SENSOR CLUSTER 3 — right third === -->
    <line x1="1100" y1="370" x2="1340" y2="370" stroke="#0066CC" stroke-width="1.8" opacity="0.58"/>
    <circle cx="1100" cy="370" r="3.2" fill="#0066CC" opacity="0.65"/>
    <circle cx="1220" cy="370" r="2.5" fill="#0066CC" opacity="0.5"/>
    <circle cx="1340" cy="370" r="3.8" fill="#0066CC" opacity="0.72"/>
    <!-- Vertical up -->
