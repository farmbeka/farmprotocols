  <!-- ===== WORDMARK — next to logo ===== -->
  <text x="195" y="88"
        font-family="'Helvetica Neue', 'Helvetica', sans-serif"
        font-size="52" font-weight="700" letter-spacing="10"
        text-anchor="start" fill="#4CAF50">FARM</text>
  <text x="197" y="118"
