    <circle cx="242" cy="176" r="3.4" fill="#0066CC" opacity="0.85"/>
    <line x1="242" y1="176" x2="264" y2="158" stroke="#0066CC" stroke-width="1.8" opacity="0.82"/>
    <circle cx="264" cy="158" r="3.8" fill="#0066CC" opacity="0.88"/>
    <line x1="264" y1="158" x2="284" y2="139" stroke="#0066CC" stroke-width="2" opacity="0.85"/>
    <circle cx="284" cy="139" r="4.6" fill="#0066CC" opacity="0.95"/>
    <!-- Soil arc -->
    <path d="M 158,262 Q 200,273 242,262" fill="none" stroke="#A0795A" stroke-width="2.1" stroke-linecap="round" opacity="0.42"/>
