<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Log — Farm Protocols</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Lora:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIG — the only line you should ever need to touch here
     ============================================================ */
  /* set in the script block at the bottom: CSV_URL */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b1209;
    color: #8aac84;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  /* ---------- header, matches site brand ---------- */
  .site-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .brand-farm {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #4ADE80;
    letter-spacing: 0.04em;
    line-height: 1;
    display: block;
  }

  .brand-protocols {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    color: #A0845C;
    letter-spacing: 0.36em;
    display: block;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .header-meta {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: #3d5c38;
    letter-spacing: 0.04em;
    line-height: 1.6;
    padding-top: 4px;
  }

  .back-link {
    display: inline-block;
    margin-top: 24px;
    margin-bottom: 40px;
    font-size: 11px;
    color: #3d5c38;
    text-decoration: none;
    letter-spacing: 0.08em;
    border-bottom: 0.5px solid #1e3a1a;
    padding-bottom: 2px;
  }
  .back-link:hover { color: #4ADE80; border-color: #4ADE80; }

  /* ---------- feed title bar ---------- */
  .feed-title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    border-bottom: 0.5px solid #131f11;
    padding-bottom: 16px;
  }

  .feed-title {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #4ADE80;
    text-transform: uppercase;
    font-weight: 500;
  }

  .feed-count {
    font-size: 11px;
    color: #3d5c38;
    letter-spacing: 0.06em;
  }

  /* ---------- filters ---------- */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 0.5px solid #1e3a1a;
    color: #3d5c38;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #4ADE80; color: #4ADE80; }
  .filter-btn.active { border-color: #4ADE80; color: #4ADE80; background: #0f2410; }

  /* ---------- entries ---------- */
  .entry {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 0.5px solid #131f11;
  }
  .entry:last-child { border-bottom: none; }

  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-zone1 { background: #444441; }
  .dot-zone2 { background: #4ADE80; }
  .dot-zone3 { background: #EF9F27; }
  .dot-multi { background: #6b6b66; }

  .thread-line { width: 0.5px; background: #131f11; flex: 1; margin-top: 4px; }

  .datecol { min-width: 78px; flex-shrink: 0; }
  .date-main { font-size: 11px; color: #3d5c38; letter-spacing: 0.05em; line-height: 1.5; }

  .entry-body { flex: 1; min-width: 0; }

  .tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }

  .tag-zone1 {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px;
    background: #1a1a17; color: #888780; border: 0.5px solid #333330;
  }
  .tag-zone2 {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px;
    background: #0e2410; color: #4ADE80; border: 0.5px solid #1e3a1a;
  }
  .tag-zone3 {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px;
    background: #1f1500; color: #EF9F27; border: 0.5px solid #3a2800;
  }
  .tag-zoneall {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px;
    background: #1a1a17; color: #888780; border: 0.5px solid #333330;
  }
  .tag-type {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px;
    background: #0a1208; color: #4a6a44; border: 0.5px solid #131f11;
  }

  .note {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    font-weight: 300;
    color: #a8c6a2;
    line-height: 1.8;
  }

  /* ---------- states ---------- */
  .state-msg {
    font-size: 12px;
    color: #2a4a26;
    text-align: center;
    padding: 48px 0;
    letter-spacing: 0.06em;
  }

  .hidden { display: none; }

  @media (max-width: 480px) {
    .entry { gap: 14px; }
    .datecol { min-width: 58px; }
    .date-main { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="site-header">
    <div>
      <span class="brand-farm">FARM</span>
      <span class="brand-protocols">PROTOCOLS</span>
    </div>
    <div class="header-meta">Red Hook, NY<br>2026 season</div>
  </div>

  <a href="/" class="back-link">&larr; back to dashboard</a>

  <div class="feed-title-row">
    <span class="feed-title">Field log</span>
    <span class="feed-count" id="entry-count"></span>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-zone="all">All zones</button>
    <button class="filter-btn" data-zone="Zone 1">Zone 1 &middot; control</button>
    <button class="filter-btn" data-zone="Zone 2">Zone 2 &middot; compost</button>
    <button class="filter-btn" data-zone="Zone 3">Zone 3 &middot; compost + biochar</button>
  </div>

  <div id="feed"></div>

  <div id="loading-msg" class="state-msg">loading field log&hellip;</div>
  <div id="empty-msg" class="state-msg hidden">no entries logged yet for this zone</div>
  <div id="error-msg" class="state-msg hidden">could not load the field log right now, try refreshing</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
/*
  ============================================================
  CONFIG
  ============================================================
  Paste the published CSV link for the "Experiment Observations"
  tab of Farm_Protocols_Data_Master here. File > Share > Publish
  to web > select the Experiment Observations sheet > CSV.

  Expected columns, in this order:
  Date | Zone | Treatment Type | Observation Type | Measurement/Value | Notes | Publish

  Only rows where Publish is exactly "Y" will show on the site.
  Leave Publish blank or set it to "N" to keep an entry private.
*/
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCaGAl2h-6zRMujxqHH9OobJUCK6S-IAQo9wK_low2kUQeIq22V0rqEqyRZ8E3CJvC5c__Ev7e2-zd/pub?gid=834922159&single=true&output=csv";

const zoneTagClass = {
  "Zone 1": "tag-zone1",
  "Zone 2": "tag-zone2",
  "Zone 3": "tag-zone3"
};
const zoneDotClass = {
  "Zone 1": "dot-zone1",
  "Zone 2": "dot-zone2",
  "Zone 3": "dot-zone3"
};

let allEntries = [];
let currentFilter = "all";

function parseZones(zoneField) {
  // handles "Zone 3 (Compost+Biochar)", "All Zones", "Zones 2 and 3", etc.
  const zones = [];
  ["Zone 1", "Zone 2", "Zone 3"].forEach(z => {
    if (zoneField.includes(z) || zoneField.toLowerCase().includes("all zone")) {
      zones.push(z);
    }
  });
  if (zoneField.toLowerCase().includes("all zone") && zones.length === 0) {
    return ["Zone 1", "Zone 2", "Zone 3"];
  }
  return zones.length ? zones : [];
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const month = d.toLocaleString('en-US', { month: 'short' });
  return `${month} ${d.getDate()}<br>${d.getFullYear()}`;
}

function renderZoneTags(zones) {
  if (zones.length === 0 || zones.length === 3) {
    return `<span class="tag-zoneall">All zones</span>`;
  }
  return zones.map(z => `<span class="${zoneTagClass[z]}">${z}</span>`).join("");
}

function renderDot(zones) {
  if (zones.length !== 1) return "dot-multi";
  return zoneDotClass[zones[0]];
}

function renderEntries() {
  const feed = document.getElementById("feed");
  const filtered = currentFilter === "all"
    ? allEntries
    : allEntries.filter(e => e.zones.includes(currentFilter));

  document.getElementById("entry-count").textContent =
    filtered.length ? `${filtered.length} ${filtered.length === 1 ? "entry" : "entries"}` : "";

  document.getElementById("empty-msg").classList.toggle("hidden", filtered.length > 0);

  feed.innerHTML = filtered.map((e, i) => `
    <div class="entry">
      <div class="connector">
        <div class="dot ${renderDot(e.zones)}"></div>
        ${i < filtered.length - 1 ? '<div class="thread-line"></div>' : ''}
      </div>
      <div class="datecol">
        <div class="date-main">${formatDate(e.date)}</div>
      </div>
      <div class="entry-body">
        <div class="tags">
          ${renderZoneTags(e.zones)}
          ${e.observationType ? `<span class="tag-type">${e.observationType}</span>` : ''}
        </div>
        <p class="note">${e.notes}</p>
      </div>
    </div>
  `).join("");
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.zone;
    renderEntries();
  });
});

Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    document.getElementById("loading-msg").classList.add("hidden");

    allEntries = results.data
      .filter(row => (row["Publish"] || "").trim().toUpperCase() === "Y")
      .map(row => ({
        date: row["Date"] || "",
        zones: parseZones(row["Zone"] || ""),
        observationType: (row["Observation Type"] || "").split(" - ")[0] || row["Observation Type"] || "",
        notes: row["Notes"] || row["Measurement / Value"] || ""
      }))
      .filter(e => e.date && e.notes)
      .sort((a, b) => new Date(b.date) - new Date(a.date));

    if (allEntries.length === 0) {
      document.getElementById("empty-msg").classList.remove("hidden");
    }
    renderEntries();
  },
  error: function() {
    document.getElementById("loading-msg").classList.add("hidden");
    document.getElementById("error-msg").classList.remove("hidden");
  }
});
</script>

</body>
</html>
